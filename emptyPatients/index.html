<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta http-equiv="X-UA-Compatible" content="IE=edge">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="../common/commonStyles/common.css">
  <link rel="stylesheet" href="./index.css">
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300&display=swap" rel="stylesheet">
  <title>Empty patients</title>
</head>

<body>
  <main>
    <header class="header-block">
      <img class="header-block__logo" src="../assets/images/logo.png" alt="Logo 'PALM CLINIC'">
      <div class="header-block__login-account">
        <p class="login-account__username">Miranda Nelson</p>
        <p class="login-account__profession">Doctor</p>
        <img class="login-account__avatar" src="../assets/images/avatar.png" alt="User avatar">
        <img class="login-account__status-indicator" src="../assets/images/indicator.png" alt="User status">
      </div>
    </header>
    <section>
      <nav class="menu">
        <ul class="menu__block">
          <li class="menu__item menu__item_active"><a href="#">Patients</a></li>
          <li class="menu__item menu__item_inactive"><a href="#">Resolutions</a></li>
        </ul>
      </nav>
      <article class="patients">
        <h1 class="patients__header">My Patients</h1>
        <div class="patients__list">
          <img class="patients__empty_image" src="../assets/images/medical-history 1.png" alt="You don't have patients">
          <p class="patients__empty_text">You have no patients yet. <br> To create a patient profile, please contact
            your administrator.</p>
        </div>
      </article>
    </section>
  </main>
</body>

</html>
